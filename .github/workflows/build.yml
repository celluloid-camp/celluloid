name: Docker Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
    branches:
      - staging
  release:
    types: [published]
  workflow_dispatch:

env:
  NEXT_PUBLIC_POSTHOG_KEY: phc_A7cjBqRMmQE4Ursk2IdMFPaBLcxY2cTvouQQyDMkCvh
  NEXT_PUBLIC_KNOCK_API_KEY: pk_tNNkD19OAJjRRYtcPzpzFRquKSK3uPNDYEapCc3SSNE
  NEXT_PUBLIC_KNOCK_FEED_CHANNEL_ID: 27641bef-8e3b-438b-8060-d25446dffbe5

jobs:
  build-containers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/celluloid-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Add "staging" tag if version contains "-alpha"
            type=raw,value=staging,enable=${{ contains(github.ref_name, '-alpha') || contains(github.event.release.tag_name, '-alpha') || github.ref_name == 'staging' }}
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description=Celluloid
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Docker meta (db migrate)
        id: meta-db-migrate
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/celluloid-db-migrate
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=staging,enable=${{ contains(github.ref_name, '-alpha') || contains(github.event.release.tag_name, '-alpha') || github.ref_name == 'staging' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set stage
        id: stage
        run: |
          STAGE="${{ (contains(github.ref_name, '-alpha') || contains(github.event.release.tag_name, '-alpha') || github.ref_name == 'staging') && 'staging' || 'production' }}"
          echo "value=$STAGE" >> $GITHUB_OUTPUT

      - name: Extract version and revision
        id: extract
        run: |
          META_JSON='${{ steps.meta.outputs.json }}'
          VERSION=$(echo "$META_JSON" | jq -r '.labels["org.opencontainers.image.version"] // "dev"')
          REVISION=$(echo "$META_JSON" | jq -r '.labels["org.opencontainers.image.revision"] // "dev"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "revision=$REVISION" >> $GITHUB_OUTPUT

      - name: Build and push web container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.extract.outputs.version }}
            COMMIT_SHA=${{ steps.extract.outputs.revision }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
            NEXT_PUBLIC_STAGE=${{ steps.stage.outputs.value }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ steps.stage.outputs.value == 'production' && env.NEXT_PUBLIC_POSTHOG_KEY || '' }}
            NEXT_PUBLIC_KNOCK_API_KEY=${{ steps.stage.outputs.value == 'production' && env.NEXT_PUBLIC_KNOCK_API_KEY || '' }}
            NEXT_PUBLIC_KNOCK_FEED_CHANNEL_ID=${{ steps.stage.outputs.value == 'production' && env.NEXT_PUBLIC_KNOCK_FEED_CHANNEL_ID || '' }}

      - name: Build and push db migrate container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/db/Dockerfile
          push: true
          tags: ${{ steps.meta-db-migrate.outputs.tags }}
          labels: ${{ steps.meta-db-migrate.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.extract.outputs.version }}
            COMMIT_SHA=${{ steps.extract.outputs.revision }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
