name: E2E Tests

# Add concurrency group to cancel previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [staging]
    paths:
      - "apps/web/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Build and start services with Docker Compose
        run: |
          docker compose -f docker-compose.yml -f docker-compose.web.yml --build up -d
          # Wait for web container to be healthy
          timeout 120 bash -c 'until [ "$(docker compose -f docker-compose.yml -f docker-compose.web.yml ps -q web)" ] && [ "$(docker inspect --format="{{.State.Health.Status}}" $(docker compose -f docker-compose.yml -f docker-compose.web.yml ps -q web))" = "healthy" ]; do echo "Waiting for web container to be healthy..."; sleep 2; done'

      - name: Run Playwright tests
        run: bunx playwright test

      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.web.yml down -v

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 5

      - name: Comment PR with test results
        uses: dorny/test-reporter@v1
        if: always() && github.event_name == 'pull_request'
        with:
          name: Playwright E2E Tests
          path: test-results/junit.xml
          reporter: java-junit
          list-suites: all
          list-tests: all
          max-annotations: 50
          fail-on-error: true
          only-summary: false
