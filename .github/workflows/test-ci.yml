name: E2E Tests

# Add concurrency group to cancel previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [staging]
    paths:
      - "apps/web/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - uses: oven-sh/setup-bun@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          target: runner
          tags: celluloid-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium firefox

      - name: Start services with Docker Compose
        run: docker compose -f docker-compose.yml -f docker-compose.web.yml up -d

      - name: Install Playwright test dependency
        run: bun install @playwright/test

      - name: Wait for web container to be healthy
        run: |
          timeout 180s bash -c '
            until curl -fsS http://localhost:3000/api/health; do
              echo "Waiting for web (http://localhost:3000/api/health) to be healthy..."
              sleep 5
            done
          '

      - name: Run Playwright tests
        run: bunx playwright test

      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.web.yml down -v

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 5

      - name: Comment PR with test results
        uses: dorny/test-reporter@v1
        if: always() && github.event_name == 'pull_request'
        with:
          name: Playwright E2E Tests
          path: test-results/junit.xml
          reporter: java-junit
          list-suites: all
          list-tests: all
          max-annotations: 50
          fail-on-error: true
          only-summary: false
