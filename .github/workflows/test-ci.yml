name: E2E Tests

# Add concurrency group to cancel previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [staging]
    paths:
      - "apps/web/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - uses: oven-sh/setup-bun@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium firefox

      - name: Install Playwright test dependency
        run: bun install @playwright/test

      - name: Start services with Docker Compose
        run: docker compose -f compose.ci.yml up -d

      - name: Wait for web service to be healthy
        run: |
          echo "Waiting for web service to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Web service is healthy!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Web service failed to become healthy after 150 seconds"
              exit 1
            fi
            echo "Attempt $i/30: Not healthy yet, waiting 5s..."
            sleep 5
          done

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f compose.ci.yml logs

      - name: Run Playwright tests
        run: bunx playwright test

      - name: Stop services
        if: always()
        run: |
          docker compose -f compose.ci.yml down -v

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 5

      - name: Comment PR with test results
        uses: dorny/test-reporter@v1
        if: always() && github.event_name == 'pull_request'
        with:
          name: Playwright E2E Tests
          path: test-results/junit.xml
          reporter: java-junit
          list-suites: all
          list-tests: all
          max-annotations: 50
          fail-on-error: true
          only-summary: false
