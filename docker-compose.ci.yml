services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: celluloid
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -h 127.0.0.1 -U postgres -d celluloid"

  minio:
    restart: unless-stopped
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: StrongPass2022
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " mc alias set myminio http://minio:9000 root StrongPass2022; mc mb
      myminio/celluloid; mc anonymous set public myminio/celluloid; echo '{\"Version\": \"2012-10-17\",
      \"Statement\": [{\"Effect\": \"Allow\", \"Action\": \"s3:PutObject\", \"Resource\":
      \"arn:aws:s3:::celluloid/*\"}]}' > /tmp/mypolicy.json; mc admin policy create myminio mypolicy
      /tmp/mypolicy.json; exit 0; "

  redis:
    image: redis:6-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
